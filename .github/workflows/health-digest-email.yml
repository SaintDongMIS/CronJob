# 早晚健康檢查 Email（台北 10:00 / 15:00）— ERP + ToBim 排程存活
# 需在 Repo Secrets 設定：SMTP_HOST, SMTP_PORT, SMTP_USER, SMTP_PASSWORD, SMTP_FROM, EMAIL_TO

name: 排程健康檢查 Email

on:
  workflow_dispatch:
    inputs:
      slot:
        description: "morning 或 afternoon"
        required: false
        default: "morning"
  schedule:
    # 台北 10:00 = UTC 02:00
    - cron: "0 2 * * *"
    # 台北 15:00 = UTC 07:00
    - cron: "0 7 * * *"

jobs:
  send-health-email:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Set digest slot
        id: slot
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "value=${{ inputs.slot }}" >> "$GITHUB_OUTPUT"
          else
            HOUR=$(TZ=Asia/Taipei date +%H)
            if [ "$HOUR" = "10" ]; then
              echo "value=morning" >> "$GITHUB_OUTPUT"
            else
              echo "value=afternoon" >> "$GITHUB_OUTPUT"
            fi
          fi

      - name: Send health digest email
        env:
          DIGEST_SLOT: ${{ steps.slot.outputs.value }}
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          SMTP_FROM: ${{ secrets.SMTP_FROM }}
          EMAIL_TO: ${{ secrets.EMAIL_TO }}
        run: python scripts/workflow_health_email.py
