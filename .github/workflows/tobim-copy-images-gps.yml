# ToBim 環景：未完成巷弄補 jpg/txt（copy-images-and-gps-sse）
# Gate：工作日下班後（17:30 後～翌日 08:30 前）；國定假日不執行

name: ToBim 環景 — 複製圖片與 GPS

on:
  workflow_dispatch:
  schedule:
    # 每 2 小時（UTC 每偶數時 :07，避開整點/半點尖峰）；業務是否執行由 should_run.py 判定
    - cron: "7 */2 * * *"

env:
  ASSETS_BASE_URL: ${{ vars.ASSETS_BASE_URL || secrets.ASSETS_BASE_URL }}

jobs:
  copy-images-gps:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Check run window (Taiwan)
        id: gate
        env:
          SHOULD_RUN_MODE: offhours
        run: python scripts/should_run.py

      - name: Run ToBim updater
        if: steps.gate.outputs.should_run == 'true'
        env:
          # 選填 Variables：TOBIM_DRY_RUN=1 可改為試跑；其餘參數用腳本內建預設
          TOBIM_DRY_RUN: ${{ vars.TOBIM_DRY_RUN || secrets.TOBIM_DRY_RUN || '0' }}
        run: python scripts/tobim_copy_images_gps.py
